<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Mailbox</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .1);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #111;
    }

    h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: #333;
    }

    input {
      width: 100%;
      padding: .6rem .8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: .75rem;
    }

    .btn-group {
      display: flex;
      gap: .5rem;
      margin-bottom: 1rem;
    }

    button {
      flex: 1;
      padding: .6rem .8rem;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity .15s;
    }

    button:hover {
      opacity: .85;
    }

    #register-btn {
      background: #4f46e5;
      color: #fff;
    }

    #login-btn {
      background: #0ea5e9;
      color: #fff;
    }

    #logout-btn {
      background: #ef4444;
      color: #fff;
      width: 100%;
      margin-top: 1rem;
    }

    #status {
      padding: .5rem;
      border-radius: 6px;
      font-size: .9rem;
      min-height: 2rem;
    }

    #status.ok {
      background: #dcfce7;
      color: #166534;
    }

    #status.err {
      background: #fee2e2;
      color: #991b1b;
    }

    #mailbox-section {
      margin-top: 1.5rem;
      display: none;
    }

    .message {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: .75rem 1rem;
      margin-bottom: .5rem;
    }

    .message .subject {
      font-weight: 600;
      margin-bottom: .25rem;
    }

    .message .from {
      font-size: .8rem;
      color: #6b7280;
      margin-bottom: .25rem;
    }

    .message .body {
      font-size: .9rem;
      color: #374151;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Secure Mailbox</h1>

    <div id="auth-section">
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
      <div class="btn-group">
        <button id="register-btn">Register Fingerprint</button>
        <button id="login-btn">Login with Fingerprint</button>
      </div>
      <div id="status"></div>
    </div>

    <div id="mailbox-section">
      <h2 id="mailbox-title">Mailbox</h2>
      <div id="messages"></div>
      <button id="logout-btn">Logout</button>
    </div>
  </div>

  <script type="module">
    import {
      startRegistration,
      startAuthentication,
    } from 'https://cdn.jsdelivr.net/npm/@simplewebauthn/browser/+esm';
    const statusEl = document.getElementById('status');
    const usernameEl = document.getElementById('username');
    const mailboxEl = document.getElementById('mailbox-section');
    const authEl = document.getElementById('auth-section');

    function getWebGLSignal() {
      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return 'no-webgl';
        const ext = gl.getExtension('WEBGL_debug_renderer_info');
        const renderer = ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
        const vendor = ext ? gl.getParameter(ext.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR);
        return `${vendor}~${renderer}`;
      } catch { return 'webgl-error'; }
    }

    async function getDeviceId() {
      const signals = [
        // Hardware signals — identical across all browsers on same device
        screen.width, screen.height, screen.colorDepth,
        navigator.hardwareConcurrency,
        navigator.deviceMemory || 'unknown',
        Intl.DateTimeFormat().resolvedOptions().timeZone,
        navigator.platform,
        navigator.language,
        navigator.maxTouchPoints,
        // GPU signals — stable across browsers (comes from OS driver)
        getWebGLSignal(),
      ].join('||');

      const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(signals));
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = isError ? 'err' : 'ok';
    }

    async function post(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      return res.json();
    }

    document.getElementById('register-btn').addEventListener('click', async () => {
      const username = usernameEl.value.trim();
      if (!username) return setStatus('Please enter a username.', true);
      setStatus('Starting registration…');
      try {
        const deviceId = await getDeviceId();
        const options = await post('/auth/register/start', { username, deviceId });
        if (options.error) return setStatus(options.error, true);

        const attResp = await startRegistration({ optionsJSON: options.options || options });
        const result = await post('/auth/register/finish', { username, credential: attResp, deviceId: await getDeviceId() });
        if (result.error) return setStatus(result.error, true);

        setStatus('Fingerprint registered! You can now log in.');
      } catch (err) {
        setStatus(err.message || 'Registration failed.', true);
      }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
      const username = usernameEl.value.trim();
      if (!username) return setStatus('Please enter a username.', true);
      setStatus('Waiting for fingerprint…');
      try {
        const options = await post('/auth/login/start', { username });
        if (options.error) return setStatus(options.error, true);

        const asseResp = await startAuthentication({ optionsJSON: options.options || options });
        const result = await post('/auth/login/finish', { username, credential: asseResp });
        if (result.error) return setStatus(result.error, true);

        setStatus(`Authenticated as ${result.username}`);
        await loadMailbox(result.username);
      } catch (err) {
        setStatus(err.message || 'Authentication failed.', true);
      }
    });

    async function loadMailbox(username) {
      const data = await fetch('/mailbox').then((r) => r.json());
      if (data.error) return setStatus(data.error, true);

      document.getElementById('mailbox-title').textContent = `${username}'s Mailbox`;
      const container = document.getElementById('messages');
      container.innerHTML = data.messages
        .map((m) => `
          <div class="message">
            <div class="from">${m.from}</div>
            <div class="subject">${m.subject}</div>
            <div class="body">${m.body}</div>
          </div>`)
        .join('');

      authEl.style.display = 'none';
      mailboxEl.style.display = 'block';
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await post('/auth/logout', {});
      authEl.style.display = 'block';
      mailboxEl.style.display = 'none';
      usernameEl.value = '';
      setStatus('Logged out.');
    });
  </script>
</body>

</html>
